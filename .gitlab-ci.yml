stages:
  - deploy

deploy_production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    # Rappel : Si tu as mis le type "File" dans GitLab, utilise : chmod 400 $SSH_PRIVATE_KEY && ssh-add $SSH_PRIVATE_KEY
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $SERVER_IP >> ~/.ssh/known_hosts
  script:
    - ssh $SERVER_USER@$SERVER_IP "
        cd ~/angelinaai/data/webapp && 
        git pull origin main && 
        docker compose build --no-cache webapp && 
        docker compose up -d"
  only:
    - main